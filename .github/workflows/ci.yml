name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - go-version: "1.14.x"
            golangci-lint-version: "v1.39.0"
          - go-version: "1.15.x"
            golangci-lint-version: "v1.42.1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ matrix.golangci-lint-version }}

      - name: Run golangci-lint
        run: golangci-lint run

      - name: Run tests
        run: go test ./...
        env:
          GO111MODULE: on
